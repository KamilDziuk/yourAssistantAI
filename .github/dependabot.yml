version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/client"

    schedule:
      interval: "weekly"

    open-pull-requests-limit: 20

    groups:
      react:
        patterns:
          - "react*"

      vite:
        patterns:
          - "vite*"

      types:
        patterns:
          - "@types/*"

      eslint:
        patterns:
          - "eslint*"

      testing:
        patterns:
          - "vitest*"
          - "@testing-library/*"

  - package-ecosystem: "npm"
    directory: "/server"

    schedule:
      interval: "weekly"

    open-pull-requests-limit: 20

    groups:
      nest:
        patterns:
          - "@nestjs/*"

      types:
        patterns:
          - "@types/*"

      eslint:
        patterns:
          - "eslint*"

      testing:
        patterns:
          - "jest*"
          - "supertest*"
